<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificador de Música Online</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/main.css">

    <link rel="stylesheet" href="css/mobile.css" media="screen and (max-width:599px)">
    <link rel="stylesheet" href="css/tablet.css" media="screen and (min-width:600px) and (max-width:1023px)">
    <link rel="stylesheet" href="css/desktop.css" media="screen and (min-width:1024px)">
</head>
<body>

    <h1 class="titulo-fijo">Identificador de Musica Online</h1>
        <div id="seccion-usuario" class="auth-wrapper">
    <div id="formularios-auth" class="auth-container">
        <div class="auth-card animated-border">
            <h3>Registro</h3>
            <input type="text" id="reg-nombre" placeholder="Nombre">
            <input type="email" id="reg-correo" placeholder="Correo">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <button onclick="ejecutarRegistro()" class="btn-glow">Crear Cuenta</button>
        </div>

        <div class="auth-card animated-border">
            <h3>Entrar</h3>
            <input type="email" id="log-correo" placeholder="Correo">
            <input type="password" id="log-pass" placeholder="Contraseña">
            <button onclick="ejecutarLogin()" class="btn-glow">Iniciar Sesión</button>
        </div>
    </div>

    <div id="bienvenida" class="oculto">
        <h2 id="user-saludo"></h2>
        <button onclick="cerrarSesion()" class="btn-link">Cerrar Sesión</button>
    </div>
</div>
    <div class="contenedor-principal">
        <div class="boton" id="btnMicrofono">
            <img src="images/puchale.png" alt="Botón de escucha">
        </div>
    </div>

    <div class="textos-inferiores">
        <h2>Toca para escuchar <br> y descubrir</h2>
        <h3>Identifica canciones con solo una pista de Audio totalmente gratis</h3>
    </div>

    <script>
        const boton = document.getElementById('btnMicrofono');
        boton.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                alert("Escuchando...");
            } catch (err) {
                alert("Para identificar permita acceso al microfono");
            }
        });
    </script>
</body>
</html>
